<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js"></script>
</head>
<body>
    <div class="container">
        <h1>My Calculator</h1>
        <div class="calculator">
            <div class="display">
                <div class="runningDisplay"></div>
                <div class="inputDisplay">0</div>
            </div>
            <!-- TryOnclick property this time -->
             <div class="aux">
                <button type="button" class="reset">Clear</button>
                <button type="button" class="delete">Delete</button>
            </div>
             <div class="numbers">
                <button type="button" class="input">1</button>
                <button type="button" class="input">2</button>
                <button type="button" class="input">3</button>
                <button type="button" class="input">4</button>
                <button type="button" class="input">5</button>
                <button type="button" class="input">6</button>
                <button type="button" class="input">7</button>
                <button type="button" class="input">8</button>
                <button type="button" class="input">9</button>
                <button type="button" class="input">.</button>
                <button type="button" class="input">0</button>
                <button type="button" class="equal">=</button>
                </div>
            <div class="procedures">
                <button type="button" class="operator">+</button>
                <button type="button" class="operator">&mdash;</button>
                <button type="button" class="operator">x</button>
                <button type="button" class="operator">&divide;</button>
            </div>
        </div>
        <div class="footer">
            Copyright &copy; LateBloomer22
        </div>
    </div>
</body>
</html>
